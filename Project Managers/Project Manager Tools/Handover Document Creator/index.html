<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Handover Document</title><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#F2F2F7;--card:#FFFFFF;--accent:#34C759}body{font-family:-apple-system,Arial,sans-serif;background:var(--bg);min-height:100vh;padding:48px 24px}.page-header{text-align:center;margin-bottom:48px}.app-icon{font-size:64px}.page-header h1{font-size:2em;font-weight:700}.wrapper{max-width:900px;margin:0 auto}.card{background:var(--card);border-radius:16px;padding:24px;margin-bottom:20px}.card-title{font-size:1.1em;font-weight:700;margin-bottom:16px}.input-group{margin-bottom:16px}.input-label{display:block;font-size:.9em;font-weight:600;margin-bottom:6px}.text-input,.text-area{width:100%;padding:12px;border:1px solid #E5E5EA;border-radius:8px;font-family:inherit}.text-area{min-height:100px}.input-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:500px){.input-row{grid-template-columns:1fr}}.button-group{display:flex;gap:12px;margin-top:24px}.btn{padding:12px 24px;border:none;border-radius:8px;font-weight:600;cursor:pointer}.btn-primary{background:var(--accent);color:white}.document-preview{background:white;padding:40px;border-radius:12px;margin-bottom:24px}.doc-header{text-align:center;border-bottom:2px solid var(--accent);padding-bottom:20px;margin-bottom:24px}.doc-header h1{font-size:22px}.doc-section{margin-bottom:20px}.doc-section h2{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:10px;border-bottom:1px solid #E5E5EA;padding-bottom:6px}.back-link{text-align:center;margin-top:40px}.back-link a{color:var(--accent);text-decoration:none;font-weight:600}
        /* ── Top Navigation ────────────────────────────── */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--card);
            border-bottom: 1px solid var(--separator);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
        }

        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: none;
            background: var(--separator);
            color: var(--label-1);
            font-size: 20px;
            cursor: pointer;
            transition: background .2s, transform .1s;
            flex-shrink: 0;
        }

        .nav-btn:hover {
            background: #D8D8DC;
            transform: scale(1.05);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        body {
            padding-top: 56px;
        }
        .recommendations-widget {
          margin-top: 48px;
          padding: 24px;
          background: var(--bg);
          border-top: 2px solid var(--separator);
        }

        .recommendations-container {
          max-width: 900px;
          margin: 0 auto;
        }

        .recommendations-title {
          font-size: 1.3em;
          font-weight: 700;
          margin-bottom: 20px;
          color: var(--label-1);
        }

        .recommendations-list {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
          gap: 16px;
        }

        .recommendation-card {
          background: var(--card);
          border: 1px solid var(--separator);
          border-radius: var(--r-lg);
          padding: 16px;
          text-align: center;
          transition: transform .2s, box-shadow .2s;
          cursor: pointer;
          text-decoration: none;
          color: inherit;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 8px;
        }

        .recommendation-card:hover {
          transform: translateY(-4px);
          box-shadow: var(--shadow);
        }

        .recommendation-name {
          font-weight: 600;
          font-size: 0.95em;
          color: var(--label-1);
        }

        .recommendation-reason {
          font-size: 0.85em;
          color: var(--label-2);
          line-height: 1.4;
        }
    </style></head><body>
    <div class="top-nav">
        <button class="nav-btn" onclick="window.location.href='../../index.html'" title="Home">🏠</button>
        <button class="nav-btn" onclick="window.history.back()" title="Back">←</button>
    </div>

<div class="page-header"><div style="display:flex;align-items:center;justify-content:center;gap:20px"><div class="app-icon">📦</div><div><h1>Handover Document</h1><p>Create project handover documentation.</p></div></div></div><div class="wrapper"><div class="input-section"><div class="card"><div class="card-title">Handover Details</div><div class="input-group"><label class="input-label">Project Name</label><input type="text" id="projectName" class="text-input"></div><div class="input-row"><div class="input-group"><label class="input-label">Handed Over To</label><input type="text" id="handoverTo" class="text-input"></div><div class="input-group"><label class="input-label">Handover Date</label><input type="date" id="handoverDate" class="text-input"></div></div></div><div class="card"><div class="card-title">Handover Content</div><div class="input-group"><label class="input-label">Project Summary</label><textarea id="summary" class="text-area" placeholder="Overview of project..."></textarea></div><div class="input-group"><label class="input-label">Key Deliverables</label><textarea id="deliverables" class="text-area" placeholder="List deliverables..."></textarea></div><div class="input-group"><label class="input-label">Documentation & Resources</label><textarea id="resources" class="text-area" placeholder="List documentation and resources..."></textarea></div><div class="input-group"><label class="input-label">Support & Training</label><textarea id="support" class="text-area" placeholder="Support and training notes..."></textarea></div></div><div class="button-group"><button class="btn btn-primary" onclick="gen()">Generate Document</button></div></div><div id="result" style="display:none"><div class="document-preview" id="preview"></div><div class="button-group"><button class="btn btn-primary" onclick="pdf()">PDF</button><button class="btn" onclick="exc()">Excel</button><button class="btn" onclick="location.reload()">New</button></div></div></div>

    <!-- Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>

    <script>
        const storageKey = 'pmDocs_HandoverDocument';
        let currentData = {};

        function autoSave() {
            const data = {};
            document.querySelectorAll('input, textarea').forEach(el => {
                if (el.id) data[el.id] = el.value;
            });
            localStorage.setItem(storageKey, JSON.stringify(data));
        }

        function loadSaved() {
            const saved = JSON.parse(localStorage.getItem(storageKey) || '{}');
            if (saved) {
                Object.keys(saved).forEach(key => {
                    const el = document.getElementById(key);
                    if (el) el.value = saved[key];
                });
            }
        }

        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('change', autoSave);
            el.addEventListener('blur', autoSave);
        });

        window.addEventListener('load', loadSaved);

        function generateDocument() {
            const projectName = document.getElementById('projectName')?.value || '';
            if (!projectName.trim()) {
                alert('Please enter a project name');
                return;
            }

            autoSave();

            // Build professional document with industry-standard formatting
            let preview = `
                <div class="doc-container" style="font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;">
                    <!-- Professional Document Header -->
                    <div class="doc-header" style="border-bottom: 3px solid var(--accent); padding-bottom: 24px; margin-bottom: 32px;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div>
                                <h1 style="margin: 0 0 8px 0; color: var(--label-1); font-size: 28px; font-weight: 700; letter-spacing: -0.5px;">
                                    ${document.querySelector('.page-header h1')?.textContent || 'Document'}
                                </h1>
                                <h2 style="margin: 0; color: var(--accent); font-size: 18px; font-weight: 600;">
                                    ${projectName}
                                </h2>
                            </div>
                            <div style="text-align: right; font-size: 12px; color: var(--label-2); background: rgba(0,0,0,.02); padding: 12px 16px; border-radius: 8px;">
                                <div><strong>Document ID:</strong> ${projectName.replace(/\s+/g, '-').toUpperCase()}</div>
                                <div><strong>Version:</strong> 1.0</div>
                                <div><strong>Date:</strong> ${new Date().toLocaleDateString()}</div>
                            </div>
                        </div>
                    </div>

                    <!-- Executive Summary -->
                    <div class="doc-summary" style="background: rgba(0,122,255,.03); padding: 16px; border-radius: 8px; margin-bottom: 24px; border-left: 4px solid var(--accent);">
                        <h2 style="color: var(--accent); font-size: 14px; font-weight: 700; margin: 0 0 8px 0;">EXECUTIVE SUMMARY</h2>
                        <p style="font-size: 13px; color: var(--label-1); line-height: 1.5; margin: 0;">
                            This document provides comprehensive information and details for <strong>${projectName}</strong>.
                            It serves as an authoritative reference for project execution and stakeholder communication.
                        </p>
                    </div>
            `;

            // Add all non-empty fields as sections with industry-standard formatting
            const fields = [];
            document.querySelectorAll('input, textarea, select').forEach(el => {
                if (el.id && el.id !== 'projectName' && el.value && el.value.trim()) {
                    const label = el.parentElement?.querySelector('label') ||
                        (el.previousElementSibling?.classList.contains('input-label') ? el.previousElementSibling : null);
                    if (label) {
                        const labelText = label.textContent.replace(' *', '').trim();
                        fields.push({
                            title: labelText,
                            content: el.value
                        });
                    }
                }
            });

            // Format fields as professional document sections
            fields.forEach((field, index) => {
                const isLastField = index === fields.length - 1;
                preview += `
                    <div class="doc-section" style="margin-bottom: 24px; padding-bottom: 16px; border-bottom: ${isLastField ? 'none' : '1px solid var(--separator)'};">
                        <h3 style="color: var(--accent); font-size: 15px; font-weight: 700; margin: 0 0 10px 0; letter-spacing: -0.3px;">
                            ${index + 1}. ${field.title.toUpperCase()}
                        </h3>
                        <p style="white-space: pre-wrap; color: var(--label-1); font-size: 13px; line-height: 1.6; margin: 0;">
                            ${field.content}
                        </p>
                    </div>
                `;
            });

            // Professional footer with compliance information
            preview += `
                    <!-- Professional Footer -->
                    <div style="border-top: 2px solid var(--separator); margin-top: 40px; padding-top: 20px; font-size: 11px; color: var(--label-2); text-align: center;">
                        <p style="margin: 4px 0;">
                            <strong>Document:</strong> ${document.querySelector('.page-header h1')?.textContent} |
                            <strong>Project:</strong> ${projectName}
                        </p>
                        <p style="margin: 4px 0;">
                            Prepared: ${new Date().toLocaleDateString()} |
                            PMBOK &amp; PRINCE2 Compliant
                        </p>
                    </div>
                </div>
            `;

            document.getElementById('preview').innerHTML = preview;
            document.getElementById('result').style.display = 'block';

            setTimeout(() => {
                document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        

        function downloadPDF() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                const projectName = (document.getElementById('projectName')?.value || '') || 'Document';
                const element = document.getElementById('preview');
                const text = element.innerText;
                const lines = doc.splitTextToSize(text, 180);

                doc.setFontSize(10);
                const pageHeight = doc.internal.pageSize.height;
                let y = 20;

                lines.forEach(line => {
                    if (y > pageHeight - 20) {
                        doc.addPage();
                        y = 20;
                    }
                    doc.text(line, 20, y);
                    y += 5;
                });

                doc.save(projectName + '_Document.pdf');
                console.log('PDF downloaded:', projectName);
            } catch (e) {
                console.error('PDF export error:', e);
                alert('Could not download PDF. Please try again.');
            }
        }

        function editDocument() {
            const preview = document.getElementById('preview');
            if (preview.contentEditable === 'true') {
                preview.contentEditable = 'false';
                preview.classList.remove('edit-mode');
            } else {
                preview.contentEditable = 'true';
                preview.classList.add('edit-mode');
                preview.focus();
            }
        }

        function resetForm() {
            document.querySelectorAll('input, textarea').forEach(el => {
                el.value = '';
            });
            localStorage.removeItem(storageKey);
            document.getElementById('result').style.display = 'none';
        }

    </script>

    <!-- Smart Recommendations Widget -->
    <div id="recommendationsWidget" class="recommendations-widget">
      <div class="recommendations-container">
        <h3 class="recommendations-title">You Might Also Need...</h3>
        <div id="recommendationsList" class="recommendations-list"></div>
      </div>
    </div>

    <script src="../../recommendationMap.js"></script>
    <script src="../../recommendationLogic.js"></script>
    <script>
      window.addEventListener('load', function() {
        loadRecommendations('Handover Document Creator');
      });
    </script>
</body>
</html>
